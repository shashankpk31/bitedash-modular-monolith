# Render Blueprint - BiteDash Deployment (Bundled Architecture)
# WHY: Frontend is bundled into backend JAR and served from /static
# Deploy: Connect GitHub repo to Render and it auto-deploys on push

services:
  # ============================================
  # BiteDash API + Frontend (Bundled)
  # ============================================
  - type: web
    name: bitedash
    runtime: docker
    dockerfilePath: bitedash-modular-backend/Dockerfile
    dockerContext: ./bitedash-modular-backend
    region: oregon
    plan: free
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      # Spring Boot Profile
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      # JWT Secret (auto-generated by Render)
      - key: JWT_SECRET
        generateValue: true

      # JVM Memory Settings (optimized for Render free tier 512MB)
      - key: JAVA_OPTS
        value: -Xmx256m -Xms128m -XX:+UseG1GC -XX:MaxGCPauseMillis=100

      # Server Port (Render provides PORT env var)
      - key: PORT
        value: 8089

      # Frontend Build URL (empty for relative URLs since bundled)
      - key: VITE_API_BASE_URL
        value: ""

      # Redis (optional - defaults to localhost, won't work but app continues)
      - key: REDIS_HOST
        value: localhost
      - key: REDIS_PORT
        value: 6379

      # Twilio SMS (optional - leave empty for demo mode)
      - key: TWILIO_ACCOUNT_SID
        value: ""
      - key: TWILIO_AUTH_TOKEN
        value: ""
      - key: TWILIO_PHONE_NUMBER
        value: ""

      # Email (optional - leave empty for demo mode)
      - key: MAIL_HOST
        value: ""
      - key: MAIL_USERNAME
        value: ""
      - key: MAIL_PASSWORD
        value: ""

# ============================================
# Database Configuration
# ============================================
# WHY H2 Instead of PostgreSQL:
# - Free tier PostgreSQL expires after 90 days
# - H2 in-memory is free forever
# - Perfect for demos and recruiter testing
# - Auto-populated with sample data on boot
# - Data resets on redeploy (fresh demo every time)
#
# NO DATABASE NEEDED - H2 configured in application-prod.yml
