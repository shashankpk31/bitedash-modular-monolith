# Production Configuration for BiteDash
# This configuration is used when deploying to production (AWS, etc.)
# Set SPRING_PROFILES_ACTIVE=prod environment variable

spring:
  application:
    name: bitedash-app

  datasource:
    # H2 In-Memory Database for Render Free Tier
    # Why H2? Free tier, no external database cost, auto-populated with sample data on boot
    # Data is reset on restart (perfect for demos and recruiter testing)
    url: jdbc:h2:mem:bitedash;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  h2:
    console:
      enabled: true  # Enable H2 console for debugging: /h2-console
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    hibernate:
      ddl-auto: create-drop  # Recreate schema on startup, populate with sample data
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
        use_sql_comments: false
    open-in-view: false

  security:
    filter:
      order: -100

  # Redis Configuration (OPTIONAL - for OTP caching)
  # If not configured, OTP will be stored in-memory (resets on restart)
  # For production with persistence, set REDIS_HOST, REDIS_PORT, REDIS_PASSWORD
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 15000
          timeout: 15000
          writetimeout: 15000

  # Async Execution
  task:
    execution:
      pool:
        core-size: 2
        max-size: 5
        queue-capacity: 100

  # Web MVC - Static Resources (Frontend)
  # Re-enable static resource handling for production (disabled in dev)
  web:
    resources:
      add-mappings: true  # Enable static resource handling in prod
      static-locations: classpath:/static/
      cache:
        cachecontrol:
          max-age: 365d  # Cache static assets for 1 year
          must-revalidate: false
          no-cache: false

# Server Configuration
server:
  port: ${PORT:8089}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
    min-response-size: 1024
  error:
    include-message: never  # Don't expose error details in production
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000 # 24 hours

# Twilio Configuration
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  phone-number: ${TWILIO_PHONE_NUMBER:}

# Logging Configuration
logging:
  level:
    root: INFO
    com.bitedash: INFO
    org.springframework: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: /app/logs/bitedash.log
    max-size: 10MB
    max-history: 30

# API Documentation (DISABLE in production)
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Management Endpoints (Restrict in production)
management:
  endpoints:
    web:
      exposure:
        include: health,info  # Only expose health and info
  endpoint:
    health:
      show-details: when-authorized  # Only show details to authorized users
  metrics:
    export:
      prometheus:
        enabled: true
