# Test configuration for BiteDash
# WHY: Isolated test environment with H2 in-memory database to avoid affecting real data

spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  # Disable Redis for tests
  data:
    redis:
      host: localhost
      port: 6379

  # Disable mail for tests
  mail:
    host: localhost
    port: 1025

# JWT configuration for tests
jwt:
  secret: test-secret-key-for-jwt-token-generation-minimum-256-bits-required
  expiration: 86400000

# Logging for tests
logging:
  level:
    com.bitedash: DEBUG
    org.springframework.security: DEBUG
